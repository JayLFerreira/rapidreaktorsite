<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 80 88" width="80" height="88">
  <defs>
    <linearGradient id="shieldFill" x1="30%" y1="0%" x2="70%" y2="100%">
      <stop offset="0%" stop-color="#071828"/>
      <stop offset="100%" stop-color="#030c14"/>
    </linearGradient>
    <linearGradient id="boltFill" x1="0%" y1="0%" x2="60%" y2="100%">
      <stop offset="0%" stop-color="#5ef0ff"/>
      <stop offset="100%" stop-color="#00b8d9"/>
    </linearGradient>
    <linearGradient id="edgeGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#00dcff"/>
      <stop offset="60%" stop-color="#0099bb"/>
      <stop offset="100%" stop-color="#00dcff"/>
    </linearGradient>
    <filter id="boltGlow" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="2.5" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="shieldGlow" x="-10%" y="-10%" width="120%" height="120%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="1.5" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Shield body -->
  <path d="M40 3 L8 14 L4 18 L4 48 Q4 70 40 85 Q76 70 76 48 L76 18 L72 14 Z"
        fill="url(#shieldFill)"/>

  <!-- Shield outer edge -->
  <path d="M40 3 L8 14 L4 18 L4 48 Q4 70 40 85 Q76 70 76 48 L76 18 L72 14 Z"
        fill="none" stroke="url(#edgeGrad)" stroke-width="1.6" filter="url(#shieldGlow)"/>

  <!-- Shield inner bevel line -->
  <path d="M40 10 L13 19 L10 23 L10 47 Q10 65 40 78 Q70 65 70 47 L70 23 L67 19 Z"
        fill="none" stroke="rgba(0,220,255,0.18)" stroke-width="1"/>

  <!-- Subtle grid lines inside shield -->
  <path d="M40 10 L13 19 L10 23 L10 47 Q10 65 40 78 Q70 65 70 47 L70 23 L67 19 Z"
        fill="rgba(0,220,255,0.03)"/>
  <line x1="25" y1="16" x2="25" y2="72" stroke="rgba(0,220,255,0.06)" stroke-width="0.75"/>
  <line x1="40" y1="10" x2="40" y2="78" stroke="rgba(0,220,255,0.06)" stroke-width="0.75"/>
  <line x1="55" y1="16" x2="55" y2="72" stroke="rgba(0,220,255,0.06)" stroke-width="0.75"/>
  <line x1="12" y1="35" x2="68" y2="35" stroke="rgba(0,220,255,0.06)" stroke-width="0.75"/>
  <line x1="10" y1="50" x2="70" y2="50" stroke="rgba(0,220,255,0.06)" stroke-width="0.75"/>

  <!-- Top corner accent marks -->
  <line x1="8" y1="14" x2="16" y2="10" stroke="rgba(0,220,255,0.5)" stroke-width="1.2" stroke-linecap="round"/>
  <line x1="72" y1="14" x2="64" y2="10" stroke="rgba(0,220,255,0.5)" stroke-width="1.2" stroke-linecap="round"/>

  <!-- Lightning bolt -->
  <path d="M46 14 L27 46 L40 46 L34 74 L57 42 L44 42 Z"
        fill="url(#boltFill)" filter="url(#boltGlow)"/>

  <!-- Bolt highlight edge -->
  <path d="M46 14 L27 46 L40 46 L34 74 L57 42 L44 42 Z"
        fill="none" stroke="rgba(180,245,255,0.35)" stroke-width="0.8"/>
</svg>
